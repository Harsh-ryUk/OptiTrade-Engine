version: '3.8'

services:
  ot-engine:
    build: .
    image: optitrade-engine:latest
    privileged: true
    volumes:
      - /dev/hugepages:/dev/hugepages
    networks:
      optitrade-net:
        ipv4_address: 172.20.0.2
    mac_address: 02:00:00:00:00:20
    command: ["/usr/local/bin/optitrade_dpdk_afpacket_engine", "-l", "0", "--no-pci", "--no-huge", "--in-memory", "--mbuf-pool-ops-name=ring_mp_mc", "-d", "librte_net_af_packet.so", "--vdev=eth_af_packet0,iface=eth0,qpairs=1,qdisc_bypass=1", "--file-prefix=ot_af_func"]

  ot-generator:
    build: .
    image: optitrade-engine:latest
    privileged: true
    volumes:
      - /dev/hugepages:/dev/hugepages
    networks:
      optitrade-net:
        ipv4_address: 172.20.0.3
    mac_address: 02:00:00:00:00:10
    depends_on:
      - ot-engine
    command: ["/usr/local/bin/optitrade_afpacket_generator", "eth0", "1000"]

networks:
  optitrade-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
