name: Build and Test OptiTrade Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build pkg-config dpdk dpdk-dev libdpdk-dev

    - name: Configure CMake
      run: |
        cmake -S . -B build-dpdk -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DOPTITRADE_ENABLE_DPDK=ON -DOPTITRADE_BUILD_BENCHMARKS=ON

    - name: Build
      run: cmake --build build-dpdk -j$(nproc)

    - name: Install Python Dependencies
      run: pip3 install matplotlib --break-system-packages

    - name: Run Tests
      run: ctest --test-dir build-dpdk --output-on-failure

    - name: Run Latency Plot Tool
      run: |
        echo "p50 latency: 1.0 ns" > dummy_log.txt
        echo "p95 latency: 2.0 ns" >> dummy_log.txt
        echo "p99 latency: 3.0 ns" >> dummy_log.txt
        echo "p99.9 latency: 4.0 ns" >> dummy_log.txt
        python3 tools/plot_latency.py dummy_log.txt
